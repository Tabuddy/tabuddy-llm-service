<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TABuddy – Canonical Skill Catalog</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #23273a;
      --border: #2e3348;
      --primary: #6c5ce7;
      --primary-light: #a29bfe;
      --accent: #00cec9;
      --accent2: #fdcb6e;
      --text: #dfe6e9;
      --text-dim: #8395a7;
      --success: #00b894;
      --danger: #e17055;
      --tag-bg: rgba(108,92,231,0.15);
      --tag-border: rgba(108,92,231,0.3);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .page { padding: 1.25rem 1.5rem 2rem; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .sub { color: var(--text-dim); font-size: 0.85rem; margin-top: 0.15rem; }
    .header .schema-pill {
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: rgba(0,206,201,0.10);
      border: 1px solid rgba(0,206,201,0.3);
      color: var(--accent);
      font-size: 0.75rem;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      white-space: nowrap;
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1rem;
    }
    .stat .v {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary-light);
      font-variant-numeric: tabular-nums;
    }
    .stat .l {
      color: var(--text-dim);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 0.15rem;
    }
    @media (max-width: 1100px) { .stats { grid-template-columns: repeat(3, 1fr); } }

    /* Layout: three lanes + drawer */
    .layout {
      display: grid;
      grid-template-columns: 280px 360px 1fr;
      gap: 0.75rem;
      height: calc(100vh - 230px);
      min-height: 500px;
    }
    .lane {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .lane-header {
      padding: 0.7rem 0.85rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .lane-title {
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.75rem;
      color: var(--text-dim);
    }
    .lane-count {
      font-size: 0.7rem;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }
    .lane-controls {
      padding: 0.6rem 0.7rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .lane-controls input,
    .lane-controls select {
      flex: 1 1 100%;
      padding: 0.5rem 0.7rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
    }
    .lane-controls input:focus,
    .lane-controls select:focus { border-color: var(--primary); }
    .lane-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.4rem;
    }
    .lane-list::-webkit-scrollbar { width: 8px; }
    .lane-list::-webkit-scrollbar-thumb {
      background: var(--surface2);
      border-radius: 4px;
    }
    .row {
      padding: 0.55rem 0.7rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      border: 1px solid transparent;
      margin-bottom: 2px;
    }
    .row:hover { background: rgba(108,92,231,0.07); }
    .row.selected {
      background: rgba(108,92,231,0.16);
      border-color: rgba(108,92,231,0.4);
    }
    .row .title {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
    }
    .row .sub {
      font-size: 0.74rem;
      color: var(--text-dim);
      margin-top: 0.15rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .row .sub .pill {
      background: var(--surface2);
      padding: 0.05rem 0.45rem;
      border-radius: 6px;
      color: var(--text-dim);
    }
    .lane-footer {
      padding: 0.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
    }
    .btn {
      padding: 0.45rem 0.9rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }
    .btn:hover { border-color: var(--primary); color: var(--primary-light); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .empty {
      padding: 1.5rem 1rem;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.85rem;
    }
    .loading {
      padding: 1rem;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    /* Detail drawer */
    .drawer {
      position: fixed;
      top: 0; right: 0;
      width: min(560px, 100%);
      height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -10px 0 30px rgba(0,0,0,0.4);
      transform: translateX(100%);
      transition: transform 0.25s ease-out;
      z-index: 100;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-header {
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .drawer-title { font-size: 1.15rem; font-weight: 700; color: var(--text); }
    .drawer-subtitle { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.2rem; font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .drawer-close {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .drawer-close:hover { color: var(--danger); border-color: var(--danger); }
    .drawer-body {
      padding: 1rem 1.2rem 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .section-h {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin: 1rem 0 0.5rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border);
    }
    .section-h:first-of-type { margin-top: 0.25rem; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.3rem; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      color: var(--primary-light);
      font-size: 0.78rem;
    }
    .chip.acc { background: rgba(0,206,201,0.10); border-color: rgba(0,206,201,0.3); color: var(--accent); }
    .chip.warn { background: rgba(253,203,110,0.10); border-color: rgba(253,203,110,0.3); color: var(--accent2); }
    .chip.muted { background: var(--surface2); border-color: var(--border); color: var(--text-dim); }
    .chip.linkable { cursor: pointer; }
    .chip.linkable:hover { background: rgba(108,92,231,0.28); border-color: var(--primary); }
    .chip.primary-alias { background: rgba(0,184,148,0.10); border-color: rgba(0,184,148,0.3); color: var(--success); font-weight: 600; }
    .empty-line { color: var(--text-dim); font-size: 0.85rem; font-style: italic; }
    .crumb {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--text);
    }
    .crumb .arrow { color: var(--text-dim); }
    .rel-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.5rem;
      align-items: center;
      padding: 0.4rem 0;
      border-bottom: 1px dashed var(--border);
      font-size: 0.85rem;
    }
    .rel-row:last-child { border-bottom: none; }
    .rel-row .arrow { color: var(--text-dim); font-family: monospace; }
    .rel-row .rel-type { font-size: 0.7rem; color: var(--text-dim); }
    .row-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem 1rem;
      font-size: 0.85rem;
    }
    .row-grid .k { color: var(--text-dim); font-size: 0.75rem; }
    .row-grid .v { color: var(--text); }
    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 90;
    }
    .scrim.open { opacity: 1; pointer-events: auto; }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 220px 280px 1fr; }
    }
    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .lane { height: 360px; }
      .drawer { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div>
        <h1>Canonical Skill Catalog</h1>
        <div class="sub">Browse roles → dimensions → skills, and trace bidirectional links. <span style="color: var(--accent2);">Read-only · prod</span></div>
      </div>
      <div class="schema-pill" id="schemaPill">schema: …</div>
    </div>

    <div class="stats" id="stats">
      <div class="stat"><div class="v" id="stRoles">—</div><div class="l">Roles</div></div>
      <div class="stat"><div class="v" id="stDims">—</div><div class="l">Dimensions</div></div>
      <div class="stat"><div class="v" id="stCats">—</div><div class="l">Categories</div></div>
      <div class="stat"><div class="v" id="stSubCats">—</div><div class="l">Sub-categories</div></div>
      <div class="stat"><div class="v" id="stSkills">—</div><div class="l">Skills</div></div>
      <div class="stat"><div class="v" id="stAliases">—</div><div class="l">Aliases</div></div>
    </div>

    <div class="layout">
      <!-- Roles lane -->
      <div class="lane">
        <div class="lane-header">
          <div class="lane-title">Roles</div>
          <div class="lane-count" id="rolesCount">—</div>
        </div>
        <div class="lane-controls">
          <input id="roleSearch" placeholder="Filter roles…" autocomplete="off">
        </div>
        <div class="lane-list" id="rolesList"><div class="loading">Loading…</div></div>
      </div>

      <!-- Dimensions lane -->
      <div class="lane">
        <div class="lane-header">
          <div class="lane-title">Dimensions <span id="dimScope" style="color:var(--text-dim); font-weight:400; text-transform:none; letter-spacing:0;"></span></div>
          <div class="lane-count" id="dimsCount">—</div>
        </div>
        <div class="lane-controls">
          <input id="dimSearch" placeholder="Search dimensions…" autocomplete="off">
        </div>
        <div class="lane-list" id="dimsList"><div class="loading">Loading…</div></div>
      </div>

      <!-- Skills lane -->
      <div class="lane">
        <div class="lane-header">
          <div class="lane-title">Skills <span id="skillScope" style="color:var(--text-dim); font-weight:400; text-transform:none; letter-spacing:0;"></span></div>
          <div class="lane-count" id="skillsCount">—</div>
        </div>
        <div class="lane-controls">
          <input id="skillSearch" placeholder="Search skills (name or alias)…" autocomplete="off" style="flex: 2 1 200px;">
          <select id="categoryFilter" style="flex: 1 1 140px;">
            <option value="">All categories</option>
          </select>
        </div>
        <div class="lane-list" id="skillsList"><div class="loading">Loading…</div></div>
        <div class="lane-footer">
          <button class="btn" id="loadMoreSkills" disabled>Load more</button>
        </div>
      </div>
    </div>
  </div>

  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <div>
        <div class="drawer-title" id="drawerTitle">—</div>
        <div class="drawer-subtitle" id="drawerSubtitle"></div>
      </div>
      <button class="drawer-close" id="drawerClose" aria-label="Close">×</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>

  <script>
    // ─── State ────────────────────────────────────────────────────────────
    const state = {
      selectedRoleId: null,
      selectedDimId: null,
      skillOffset: 0,
      skillTotal: 0,
      skillLimit: 50,
      lastSkillQuery: { dimension_id: null, category_id: null, q: "" },
      roles: [],          // full client-side cache for filtering
      categories: [],     // for the select
    };

    // ─── Helpers ──────────────────────────────────────────────────────────
    function escapeHtml(s) {
      if (s === null || s === undefined) return "";
      return String(s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function fmt(n) {
      if (n === null || n === undefined) return "—";
      return Number(n).toLocaleString();
    }
    function debounce(fn, ms) {
      let t;
      return function(...args) {
        clearTimeout(t);
        t = setTimeout(() => fn.apply(this, args), ms);
      };
    }
    async function fetchJSON(url) {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`${resp.status} ${url}`);
      return resp.json();
    }

    // ─── Stats + initial load ─────────────────────────────────────────────
    async function loadStats() {
      try {
        const s = await fetchJSON("/api/canonical-skill/stats");
        document.getElementById("stRoles").textContent = fmt(s.roles);
        document.getElementById("stDims").textContent = fmt(s.dimensions);
        document.getElementById("stCats").textContent = fmt(s.categories);
        document.getElementById("stSubCats").textContent = fmt(s.sub_categories);
        document.getElementById("stSkills").textContent = fmt(s.skills);
        document.getElementById("stAliases").textContent = fmt(s.aliases);
        document.getElementById("schemaPill").textContent = `schema: ${s.schema || "?"}`;
      } catch (e) {
        document.getElementById("schemaPill").textContent = "schema: error";
        console.error("stats", e);
      }
    }

    async function loadCategories() {
      try {
        const r = await fetchJSON("/api/canonical-skill/categories");
        state.categories = r.items || [];
        const sel = document.getElementById("categoryFilter");
        sel.innerHTML = '<option value="">All categories</option>' +
          state.categories.map(c =>
            `<option value="${c.id}">${escapeHtml(c.display_name)} (${c.skill_count})</option>`
          ).join("");
      } catch (e) { console.error("categories", e); }
    }

    // ─── Roles lane ───────────────────────────────────────────────────────
    function renderRoles(filterText) {
      const list = document.getElementById("rolesList");
      const q = (filterText || "").toLowerCase().trim();
      const items = q
        ? state.roles.filter(r =>
            (r.display_name || "").toLowerCase().includes(q) ||
            (r.slug || "").toLowerCase().includes(q))
        : state.roles;

      document.getElementById("rolesCount").textContent =
        q ? `${items.length} of ${state.roles.length}` : `${state.roles.length}`;

      if (!items.length) {
        list.innerHTML = '<div class="empty">No roles match.</div>';
        return;
      }
      list.innerHTML = items.map(r => `
        <div class="row ${state.selectedRoleId === r.id ? "selected" : ""}" data-role-id="${r.id}">
          <div class="title">${escapeHtml(r.display_name)}</div>
          <div class="sub">
            <span class="pill">${r.dimension_count} dims</span>
            ${r.role_archetype ? `<span class="pill">${escapeHtml(r.role_archetype)}</span>` : ""}
          </div>
        </div>`).join("");
      list.querySelectorAll("[data-role-id]").forEach(el => {
        el.addEventListener("click", () => onSelectRole(parseInt(el.dataset.roleId, 10)));
      });
    }

    async function loadRoles() {
      try {
        const r = await fetchJSON("/api/canonical-skill/roles");
        state.roles = r.items || [];
        renderRoles(document.getElementById("roleSearch").value);
      } catch (e) {
        document.getElementById("rolesList").innerHTML =
          `<div class="empty">Failed to load roles. ${escapeHtml(e.message)}</div>`;
      }
    }

    function onSelectRole(roleId) {
      const same = state.selectedRoleId === roleId;
      state.selectedRoleId = same ? null : roleId;
      state.selectedDimId = null;
      renderRoles(document.getElementById("roleSearch").value);
      document.getElementById("dimScope").textContent = "";
      document.getElementById("skillScope").textContent = "";
      // Clear dim search when scope changes; keep skill search.
      document.getElementById("dimSearch").value = "";
      const r = state.roles.find(x => x.id === state.selectedRoleId);
      if (r) document.getElementById("dimScope").textContent = `· ${r.display_name}`;
      loadDimensions();
      loadSkills(/*reset=*/ true);
      if (state.selectedRoleId !== null) openRoleDrawer(state.selectedRoleId);
    }

    // ─── Dimensions lane ──────────────────────────────────────────────────
    async function loadDimensions() {
      const list = document.getElementById("dimsList");
      list.innerHTML = '<div class="loading">Loading…</div>';
      const q = document.getElementById("dimSearch").value.trim();
      const params = new URLSearchParams({ limit: "200" });
      if (state.selectedRoleId !== null) params.set("role_id", String(state.selectedRoleId));
      if (q) params.set("q", q);

      try {
        const r = await fetchJSON(`/api/canonical-skill/dimensions?${params}`);
        const items = r.items || [];
        document.getElementById("dimsCount").textContent =
          r.total > items.length ? `${items.length} of ${r.total}` : `${items.length}`;

        if (!items.length) {
          list.innerHTML = '<div class="empty">No dimensions in this scope.</div>';
          return;
        }
        list.innerHTML = items.map(d => `
          <div class="row ${state.selectedDimId === d.id ? "selected" : ""}" data-dim-id="${d.id}">
            <div class="title">${escapeHtml(d.display_name)}</div>
            <div class="sub">
              <span class="pill">${d.skill_count || 0} skills</span>
              <span class="pill">${d.role_count || 0} roles</span>
              ${d.difficulty_hint ? `<span class="pill">${escapeHtml(d.difficulty_hint)}</span>` : ""}
            </div>
          </div>`).join("");
        list.querySelectorAll("[data-dim-id]").forEach(el => {
          el.addEventListener("click", () => onSelectDim(parseInt(el.dataset.dimId, 10)));
        });
      } catch (e) {
        list.innerHTML = `<div class="empty">Failed to load. ${escapeHtml(e.message)}</div>`;
      }
    }

    function onSelectDim(dimId) {
      const same = state.selectedDimId === dimId;
      state.selectedDimId = same ? null : dimId;
      // Re-render selection state without re-fetching (lighter).
      document.querySelectorAll("#dimsList [data-dim-id]").forEach(el => {
        el.classList.toggle("selected", parseInt(el.dataset.dimId, 10) === state.selectedDimId);
      });
      loadSkills(/*reset=*/ true);
      if (state.selectedDimId !== null) openDimDrawer(state.selectedDimId);
    }

    // ─── Skills lane ──────────────────────────────────────────────────────
    async function loadSkills(reset = false) {
      const list = document.getElementById("skillsList");
      const q = document.getElementById("skillSearch").value.trim();
      const catId = document.getElementById("categoryFilter").value;

      if (reset) {
        state.skillOffset = 0;
        state.skillTotal = 0;
        list.innerHTML = '<div class="loading">Loading…</div>';
      }

      const params = new URLSearchParams({
        limit: String(state.skillLimit),
        offset: String(state.skillOffset),
      });
      if (state.selectedDimId !== null) params.set("dimension_id", String(state.selectedDimId));
      if (catId) params.set("category_id", catId);
      if (q) params.set("q", q);

      // Update scope label
      const dim = state.selectedDimId
        ? document.querySelector(`#dimsList [data-dim-id="${state.selectedDimId}"] .title`)?.textContent
        : null;
      document.getElementById("skillScope").textContent = dim ? `· ${dim}` : "";

      try {
        const r = await fetchJSON(`/api/canonical-skill/skills?${params}`);
        state.skillTotal = r.total || 0;
        const items = r.items || [];
        document.getElementById("skillsCount").textContent =
          r.total > 0 ? `${state.skillOffset + items.length} of ${r.total}` : "0";

        const html = items.map(s => `
          <div class="row" data-skill-id="${s.id}">
            <div class="title">${escapeHtml(s.display_name)}</div>
            <div class="sub">
              ${s.skill_nature ? `<span class="pill">${escapeHtml(s.skill_nature)}</span>` : ""}
              ${s.category_slug ? `<span class="pill">${escapeHtml(s.category_slug)}</span>` : ""}
              ${s.volatility && s.volatility !== "STABLE" ? `<span class="pill">${escapeHtml(s.volatility)}</span>` : ""}
              ${s.primary_alias && s.primary_alias.toLowerCase() !== (s.display_name || "").toLowerCase() ? `<span class="pill">aka ${escapeHtml(s.primary_alias)}</span>` : ""}
            </div>
          </div>`).join("");

        if (reset) {
          list.innerHTML = html || '<div class="empty">No skills match.</div>';
        } else {
          list.insertAdjacentHTML("beforeend", html);
        }
        list.querySelectorAll("[data-skill-id]").forEach(el => {
          if (!el._wired) {
            el._wired = true;
            el.addEventListener("click", () => openSkillDrawer(parseInt(el.dataset.skillId, 10)));
          }
        });

        const more = document.getElementById("loadMoreSkills");
        const have = state.skillOffset + items.length;
        more.disabled = have >= state.skillTotal;
        more.textContent = more.disabled ? "All loaded" : `Load more (${state.skillTotal - have} left)`;
        state.skillOffset = have;
      } catch (e) {
        list.innerHTML = `<div class="empty">Failed to load. ${escapeHtml(e.message)}</div>`;
      }
    }

    // ─── Detail drawer ────────────────────────────────────────────────────
    const drawer = document.getElementById("drawer");
    const scrim = document.getElementById("scrim");
    function openDrawer() { drawer.classList.add("open"); scrim.classList.add("open"); }
    function closeDrawer() { drawer.classList.remove("open"); scrim.classList.remove("open"); }
    document.getElementById("drawerClose").addEventListener("click", closeDrawer);
    scrim.addEventListener("click", closeDrawer);
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closeDrawer();
    });

    function setDrawerHeader(title, subtitle) {
      document.getElementById("drawerTitle").textContent = title;
      document.getElementById("drawerSubtitle").textContent = subtitle || "";
    }

    function chip(text, cls = "") {
      return `<span class="chip ${cls}">${escapeHtml(text)}</span>`;
    }
    function chipLink(text, cls, dataAttr, dataVal) {
      return `<span class="chip linkable ${cls}" data-${dataAttr}="${escapeHtml(dataVal)}">${escapeHtml(text)}</span>`;
    }

    async function openRoleDrawer(roleId) {
      setDrawerHeader("Loading role…", "");
      document.getElementById("drawerBody").innerHTML = '<div class="loading">Loading…</div>';
      openDrawer();
      try {
        const r = await fetchJSON(`/api/canonical-skill/roles/${roleId}`);
        setDrawerHeader(r.display_name, `${r.slug}${r.role_archetype ? "  ·  " + r.role_archetype : ""}`);
        const dims = (r.dimensions || []);
        const body = `
          <div class="section-h">Dimensions (${dims.length})</div>
          ${dims.length === 0 ? '<div class="empty-line">No linked dimensions.</div>' :
            `<div class="chip-row">${dims.map(d =>
              chipLink(`${d.display_name} · ${d.skill_count} skills`, "", "dim-id", String(d.id))
            ).join("")}</div>`}
        `;
        document.getElementById("drawerBody").innerHTML = body;
        wireChipClicks();
      } catch (e) {
        document.getElementById("drawerBody").innerHTML =
          `<div class="empty-line">Failed: ${escapeHtml(e.message)}</div>`;
      }
    }

    async function openDimDrawer(dimId) {
      setDrawerHeader("Loading dimension…", "");
      document.getElementById("drawerBody").innerHTML = '<div class="loading">Loading…</div>';
      openDrawer();
      try {
        const d = await fetchJSON(`/api/canonical-skill/dimensions/${dimId}`);
        setDrawerHeader(d.display_name, `${d.slug}${d.difficulty_hint ? "  ·  " + d.difficulty_hint : ""}`);
        const roles = d.roles || [];
        const skills = d.skills_preview || [];
        const more = (d.skill_count || 0) - skills.length;
        const body = `
          ${d.rationale ? `<div class="section-h">Rationale</div><div style="font-size:0.88rem; color:var(--text);">${escapeHtml(d.rationale)}</div>` : ""}
          <div class="section-h">Linked roles (${roles.length})</div>
          ${roles.length === 0 ? '<div class="empty-line">No roles linked.</div>' :
            `<div class="chip-row">${roles.map(r =>
              chipLink(r.display_name, "acc", "role-id", String(r.id))
            ).join("")}</div>`}
          <div class="section-h">Skills (${d.skill_count || 0})</div>
          ${skills.length === 0 ? '<div class="empty-line">No skills.</div>' :
            `<div class="chip-row">${skills.map(s =>
              chipLink(s.display_name, "muted", "skill-id", String(s.id))
            ).join("")}${more > 0 ? `<span class="chip muted">+${more} more</span>` : ""}</div>`}
        `;
        document.getElementById("drawerBody").innerHTML = body;
        wireChipClicks();
      } catch (e) {
        document.getElementById("drawerBody").innerHTML =
          `<div class="empty-line">Failed: ${escapeHtml(e.message)}</div>`;
      }
    }

    async function openSkillDrawer(skillId) {
      setDrawerHeader("Loading skill…", "");
      document.getElementById("drawerBody").innerHTML = '<div class="loading">Loading…</div>';
      openDrawer();
      try {
        const s = await fetchJSON(`/api/canonical-skill/skills/${skillId}`);
        setDrawerHeader(s.display_name, s.slug);

        // Identity chips
        const idChips = [];
        if (s.skill_nature) idChips.push(chip(s.skill_nature));
        if (s.volatility) idChips.push(chip(s.volatility, s.volatility === "DEPRECATED" ? "warn" : ""));
        if (s.typical_lifespan) idChips.push(chip(s.typical_lifespan, "muted"));
        if (s.confidence !== null && s.confidence !== undefined) idChips.push(chip(`conf ${Number(s.confidence).toFixed(2)}`, "muted"));
        if (s.is_extractable === false) idChips.push(chip("non-extractable", "warn"));
        if (s.is_also_category) idChips.push(chip("is also a category", "acc"));

        // Taxonomy breadcrumb
        const taxonomy = (s.category_display || s.sub_category_display)
          ? `<div class="crumb">${s.category_display ? escapeHtml(s.category_display) : ""}${s.sub_category_display ? ` <span class="arrow">›</span> ${escapeHtml(s.sub_category_display)}` : ""}</div>`
          : `<div class="empty-line">No category set.</div>`;

        // Aliases
        const aliases = s.aliases || [];
        const aliasHtml = aliases.length === 0
          ? '<div class="empty-line">No aliases.</div>'
          : `<div class="chip-row">${aliases.map(a => {
              const cls = a.is_primary ? "primary-alias" : "muted";
              const label = a.alias_text + (a.alias_type && a.alias_type !== "CANONICAL" ? ` · ${a.alias_type}` : "");
              return chip(label, cls);
            }).join("")}</div>`;

        // Linked dimensions (chips, click → re-select middle lane)
        const dims = s.dimensions || [];
        const dimsHtml = dims.length === 0
          ? '<div class="empty-line">No parent dimensions.</div>'
          : `<div class="chip-row">${dims.map(d =>
              chipLink(d.display_name, "", "dim-id", String(d.id))
            ).join("")}</div>`;

        // Linked roles (transitive)
        const roles = s.roles || [];
        const rolesHtml = roles.length === 0
          ? '<div class="empty-line">No transitive roles.</div>'
          : `<div class="chip-row">${roles.map(r =>
              chipLink(r.display_name, "acc", "role-id", String(r.id))
            ).join("")}</div>`;

        // Tags
        const tags = s.tags || [];
        const tagsHtml = tags.length === 0
          ? '<div class="empty-line">No tags.</div>'
          : `<div class="chip-row">${tags.map(t => chip(t, "muted")).join("")}</div>`;

        // Relationships
        const rels = s.relationships || [];
        const relsHtml = rels.length === 0
          ? '<div class="empty-line">No skill relationships recorded.</div>'
          : rels.map(r => {
              const arrow = r.side === "outgoing" ? "→" : "←";
              return `<div class="rel-row">
                <span class="rel-type">${escapeHtml(r.relationship_type)}</span>
                <span><span class="arrow">${arrow}</span>
                  <span class="chip linkable" data-skill-id="${r.other_id}">${escapeHtml(r.other_display)}</span>
                </span>
                <span class="rel-type">${r.base_confidence !== null ? "conf " + Number(r.base_confidence).toFixed(2) : ""}</span>
              </div>`;
            }).join("");

        // Hierarchy
        const parts = [];
        if (s.parent_skill) {
          parts.push(`<div class="row-grid">
            <div><div class="k">Parent skill</div><div class="v">${chipLink(s.parent_skill.display_name, "muted", "skill-id", String(s.parent_skill.id))}</div></div>
            <div><div class="k">Depth</div><div class="v">${escapeHtml(String(s.depth ?? "?"))}</div></div>
          </div>`);
        }
        if (s.version_parent) {
          parts.push(`<div class="row-grid">
            <div><div class="k">Version parent</div><div class="v">${chipLink(s.version_parent.display_name, "muted", "skill-id", String(s.version_parent.id))}</div></div>
            <div><div class="k">Version tag</div><div class="v">${escapeHtml(s.version_tag || "—")}</div></div>
          </div>`);
        }
        if (s.children && s.children.length) {
          parts.push(`<div class="section-h" style="margin-top:0.5rem;">Children (${s.children.length})</div>
            <div class="chip-row">${s.children.map(c =>
              chipLink(c.display_name, "muted", "skill-id", String(c.id))
            ).join("")}</div>`);
        }
        const hierarchyHtml = parts.length ? parts.join("") : '<div class="empty-line">No parent / version / children.</div>';

        document.getElementById("drawerBody").innerHTML = `
          ${idChips.length ? `<div class="chip-row" style="margin-bottom:0.25rem;">${idChips.join("")}</div>` : ""}
          <div class="section-h">Taxonomy</div>${taxonomy}
          <div class="section-h">Aliases (${aliases.length})</div>${aliasHtml}
          <div class="section-h">Linked dimensions (${dims.length})</div>${dimsHtml}
          <div class="section-h">Linked roles (${roles.length}, transitive via dimensions)</div>${rolesHtml}
          <div class="section-h">Tags (${tags.length})</div>${tagsHtml}
          <div class="section-h">Skill relationships (${rels.length})</div>${relsHtml}
          <div class="section-h">Hierarchy</div>${hierarchyHtml}
        `;
        wireChipClicks();
      } catch (e) {
        document.getElementById("drawerBody").innerHTML =
          `<div class="empty-line">Failed: ${escapeHtml(e.message)}</div>`;
      }
    }

    function wireChipClicks() {
      const body = document.getElementById("drawerBody");
      body.querySelectorAll("[data-role-id]").forEach(el => {
        el.addEventListener("click", () => {
          const id = parseInt(el.dataset.roleId, 10);
          // Set role in left lane and refresh dims; open role detail.
          state.selectedRoleId = id;
          state.selectedDimId = null;
          renderRoles(document.getElementById("roleSearch").value);
          loadDimensions();
          loadSkills(true);
          openRoleDrawer(id);
          const r = state.roles.find(x => x.id === id);
          document.getElementById("dimScope").textContent = r ? `· ${r.display_name}` : "";
          document.getElementById("skillScope").textContent = "";
        });
      });
      body.querySelectorAll("[data-dim-id]").forEach(el => {
        el.addEventListener("click", () => {
          const id = parseInt(el.dataset.dimId, 10);
          state.selectedDimId = id;
          // Refresh dim list to highlight selection (visible if current scope contains it).
          loadDimensions();
          loadSkills(true);
          openDimDrawer(id);
        });
      });
      body.querySelectorAll("[data-skill-id]").forEach(el => {
        el.addEventListener("click", () => {
          const id = parseInt(el.dataset.skillId, 10);
          openSkillDrawer(id);
        });
      });
    }

    // ─── Wire inputs ──────────────────────────────────────────────────────
    document.getElementById("roleSearch").addEventListener("input", debounce(e => {
      renderRoles(e.target.value);
    }, 100));
    document.getElementById("dimSearch").addEventListener("input", debounce(() => {
      loadDimensions();
    }, 250));
    document.getElementById("skillSearch").addEventListener("input", debounce(() => {
      loadSkills(true);
    }, 250));
    document.getElementById("categoryFilter").addEventListener("change", () => loadSkills(true));
    document.getElementById("loadMoreSkills").addEventListener("click", () => loadSkills(false));

    // ─── Boot ─────────────────────────────────────────────────────────────
    (async function init() {
      await Promise.all([loadStats(), loadRoles(), loadCategories()]);
      await Promise.all([loadDimensions(), loadSkills(true)]);
    })();
  </script>
</body>
</html>
