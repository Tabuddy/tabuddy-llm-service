<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TABuddy – Model Pipeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0d14; --bg2: #0f1420; --bg3: #141927;
      --card: #1a2035; --card2: #1e2540;
      --border: #2a3350; --border-bright: #3a4870;
      --accent: #6366f1; --accent2: #818cf8;
      --accent-glow: rgba(99,102,241,0.25);
      --cyan: #22d3ee; --cyan-dim: rgba(34,211,238,0.15);
      --green: #10b981; --green-dim: rgba(16,185,129,0.15);
      --yellow: #f59e0b; --yellow-dim: rgba(245,158,11,0.15);
      --red: #ef4444; --red-dim: rgba(239,68,68,0.15);
      --text: #e2e8f0; --text-dim: #94a3b8; --text-dimmer: #475569;
      --radius: 12px; --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .bg-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
      background-size: 60px 60px; }
    .wrapper { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    header { padding: 24px 0; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
    .header-inner { display: flex; align-items: center; gap: 16px; }
    .logo-badge { background: linear-gradient(135deg, var(--accent), #8b5cf6); border-radius: var(--radius-sm);
      padding: 8px 14px; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
    h1 span { color: var(--accent2); }
    h2 { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--text); }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
    .panel-title { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    /* Model status cards */
    .model-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
    .model-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px; }
    .model-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .model-card-name { font-size: 14px; font-weight: 700; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .status-dot.loaded { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.missing { background: var(--red); box-shadow: 0 0 8px var(--red); }
    .meta-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); padding: 4px 0; }
    .meta-row .val { color: var(--text); font-weight: 500; font-family: 'JetBrains Mono', monospace; }
    .label-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
    .label-tag { padding: 2px 8px; background: var(--accent-glow); color: var(--accent2); border-radius: 99px; font-size: 10px; font-weight: 600; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; font-family: 'Inter', sans-serif; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; box-shadow: 0 4px 20px var(--accent-glow); }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .action-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    /* Table */
    .log-table-wrap { overflow-x: auto; margin-top: 12px; }
    .log-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .log-table th { text-align: left; padding: 8px 12px; color: var(--text-dimmer); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em; font-size: 10px; border-bottom: 1px solid var(--border); }
    .log-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top;
      font-family: 'JetBrains Mono', monospace; color: var(--text-dim); }
    .log-table tr:hover td { background: var(--bg3); }
    .conf-badge { padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 700; }
    .conf-badge.low { background: var(--red-dim); color: var(--red); }
    .conf-badge.mid { background: var(--yellow-dim); color: var(--yellow); }

    /* Training status bar */
    .train-status { padding: 14px 18px; border-radius: var(--radius-sm); margin-top: 14px; display: none; }
    .train-status.training { display: block; background: var(--accent-glow); border: 1px solid rgba(99,102,241,0.3); }
    .train-status.completed { display: block; background: var(--green-dim); border: 1px solid rgba(16,185,129,0.3); }
    .train-status.failed { display: block; background: var(--red-dim); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
    .train-status .msg { font-size: 13px; font-weight: 500; }
    .train-status .layers { margin-top: 8px; display: flex; gap: 6px; }
    .layer-chip { padding: 2px 10px; background: var(--bg3); border-radius: 99px; font-size: 11px; color: var(--text-dim); }
    .layer-chip.done { color: var(--green); }

    /* Progress bar */
    .progress-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 10px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--cyan)); border-radius: 99px; width: 0%; }
    .progress-fill.indeterminate { animation: indet 1.5s ease infinite; width: 30%; }
    @keyframes indet { 0%{margin-left:0} 50%{margin-left:70%} 100%{margin-left:0} }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; padding: 12px 18px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 500; box-shadow: var(--shadow); transform: translateY(20px); opacity: 0;
      transition: all 0.3s ease; pointer-events: none; background: var(--card); }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border: 1px solid var(--green); color: var(--green); }
    .toast.error { border: 1px solid var(--red); color: var(--red); }
    .toast.info { border: 1px solid var(--accent); color: var(--accent2); }

    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      padding: 14px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5); max-width: 400px; transform: translateY(20px); opacity: 0;
      transition: all 0.3s ease; pointer-events: none; background: var(--card); }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { border: 1px solid var(--red); color: var(--red); }
    #toast.success { border: 1px solid var(--green); color: var(--green); }
    #toast.info { border: 1px solid var(--accent); color: var(--accent2); }

    .empty-log { text-align: center; padding: 40px; color: var(--text-dimmer); font-size: 13px; }

    @media (max-width: 768px) {
      .model-grid { grid-template-columns: 1fr; }
      .action-row { flex-direction: column; align-items: stretch; }
      .btn { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="wrapper">
    <header>
      <div class="header-inner">
        <div class="logo-badge">TABuddy</div>
        <div>
          <h1>Model <span>Pipeline</span> Management</h1>
          <p style="font-size:13px;color:var(--text-dim);margin-top:4px;">Train, deploy, and monitor SetFit classification models</p>
        </div>
        <a href="/resume-ranking" style="margin-left:auto;color:var(--accent2);font-size:13px;text-decoration:none;hover:underline;">← Ranking UI</a>
      </div>
    </header>

    <!-- Section A: Model Status -->
    <div class="panel">
      <div class="panel-title"><span>🧠</span> Model Registry</div>
      <div class="model-grid" id="model-cards">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Section B: Training Controls -->
    <div class="panel">
      <div class="panel-title"><span>⚙️</span> Training Controls</div>
      <div class="action-row">
        <button class="btn btn-primary" id="train-btn" onclick="startTraining()">
          <span id="train-icon">🚀</span>
          <span id="train-label">Train All Layers</span>
        </button>
        <div style="flex:1;">
          <div class="progress-track"><div class="progress-fill" id="train-progress"></div></div>
        </div>
      </div>
      <div class="train-status" id="train-status"></div>
    </div>

    <!-- Section C: Azure Sync -->
    <div class="panel">
      <div class="panel-title"><span>☁️</span> Azure Blob Sync</div>
      <div class="action-row">
        <button class="btn btn-secondary" id="azure-dl-btn" onclick="azureDownload()">
          <span>⬇️</span> Download from Azure
        </button>
        <button class="btn btn-secondary" id="azure-ul-btn" onclick="azureUpload()">
          <span>⬆️</span> Upload to Azure
        </button>
        <span id="azure-last" style="font-size:12px;color:var(--text-dimmer);margin-left:8px;"></span>
      </div>
    </div>

    <!-- Section D: Low Confidence Logs -->
    <div class="panel">
      <div class="panel-title"><span>📉</span> Low Confidence Log &nbsp;<span id="log-count" style="color:var(--text-dimmer);font-size:11px;"></span></div>
      <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;">
        <select id="layer-filter" style="background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-family:'Inter',sans-serif;">
          <option value="">All Layers</option>
          <option value="Tier 1">Tier 1</option>
          <option value="Tier 2">Tier 2</option>
          <option value="Tier 3">Tier 3</option>
        </select>
        <button class="btn btn-danger" style="margin-left:8px;padding:6px 14px;font-size:12px;" onclick="clearLogs()">🗑 Clear All</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
        <select id="sort-order" style="background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-family:'Inter',sans-serif;">
          <option value="desc">Newest first</option>
          <option value="asc">Oldest first</option>
        </select>
        <select id="per-page" style="background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-family:'Inter',sans-serif;">
          <option value="25">25 per page</option>
          <option value="50">50 per page</option>
          <option value="100">100 per page</option>
        </select>
        <span id="pagination-info" style="font-size:12px;color:var(--text-dimmer);margin-left:auto;"></span>
      </div>
      <div id="pagination-controls" style="display:flex;gap:4px;align-items:center;margin-bottom:12px;"></div>
      <div id="log-table-wrap">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // ── Toast ──────────────────────────────────────────────────
    function showToast(msg, type = 'info', duration = 4000) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `show ${type}`;
      clearTimeout(t._t);
      t._t = setTimeout(() => { t.className = type; }, duration);
    }

    // ── Model Status ──────────────────────────────────────────
    async function loadModels() {
      try {
        const res = await fetch('/api/models/status');
        const data = await res.json();
        const grid = document.getElementById('model-cards');
        grid.innerHTML = data.models.map(m => {
          const dotClass = m.loaded ? 'loaded' : 'missing';
          const sizeStr = m.size_mb ? `${m.size_mb} MB` : '—';
          const dateStr = m.modified ? new Date(m.modified).toLocaleString() : '—';
          return `<div class="model-card">
            <div class="model-card-header">
              <div style="display:flex;align-items:center;gap:8px;">
                <span class="status-dot ${dotClass}"></span>
                <span class="model-card-name">${m.display}</span>
              </div>
              <span style="font-size:11px;color:${m.loaded?'var(--green)':'var(--red)'}">${m.loaded?'Loaded':'Not loaded'}</span>
            </div>
            <div class="meta-row"><span>Path</span><span class="val" style="font-size:10px;">setfit_models/${m.tier === 'tier1' ? 'tier1_router' : m.tier === 'tier2' ? 'tier2_digital' : 'tier3_app_eng'}/</span></div>
            <div class="meta-row"><span>Size</span><span class="val">${sizeStr}</span></div>
            <div class="meta-row"><span>Modified</span><span class="val">${dateStr}</span></div>
            <div class="meta-row"><span>Labels</span><span class="val">${m.label_count}</span></div>
            <div class="label-list">${m.labels.map(l => `<span class="label-tag">${l}</span>`).join('')}</div>
          </div>`;
        }).join('');
      } catch(e) { showToast('Failed to load model status', 'error'); }
    }

    // ── Training ──────────────────────────────────────────────
    let pollInterval = null;

    async function startTraining() {
      const btn = document.getElementById('train-btn');
      btn.disabled = true;
      document.getElementById('train-icon').textContent = '⏳';
      document.getElementById('train-label').textContent = 'Starting…';
      document.getElementById('train-progress').className = 'progress-fill indeterminate';
      try {
        const res = await fetch('/api/training/start', { method: 'POST' });
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        showToast('Training started in background', 'success');
        pollInterval = setInterval(checkTraining, 3000);
        checkTraining();
      } catch(e) { showToast('Failed to start training: ' + e.message, 'error'); btn.disabled = false; document.getElementById('train-icon').textContent = '🚀'; document.getElementById('train-label').textContent = 'Train All Layers'; document.getElementById('train-progress').style.width = '0%'; }
    }

    async function checkTraining() {
      try {
        const res = await fetch('/api/training/status');
        const s = await res.json();
        const el = document.getElementById('train-status');
        const prog = document.getElementById('train-progress');
        const btn = document.getElementById('train-btn');

        if (s.status === 'idle') {
          el.className = 'train-status'; prog.style.width = '0%';
          btn.innerHTML = '<span>🚀</span><span>Train All Layers</span>'; btn.disabled = false;
          if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
          loadModels();
          return;
        }

        if (s.status === 'training') {
          el.className = 'train-status training';
          el.innerHTML = `<div class="msg">⏳ Training models in progress…</div>
            ${s.layers_trained.length ? `<div class="layers">${['tier1','tier2','tier3'].map(t =>
              `<span class="layer-chip ${s.layers_trained.includes(t)?'done':''}">${s.layers_trained.includes(t)?'✓':'○'} ${t}</span>`
            ).join('')}</div>` : ''}`;
          prog.className = 'progress-fill indeterminate';
          btn.disabled = true;
        } else if (s.status === 'completed') {
          el.className = 'train-status completed';
          el.innerHTML = `<div class="msg">✅ Training complete! Models uploaded to Azure & hot-reloaded.</div>
            <div class="layers">${s.layers_trained.map(t => `<span class="layer-chip done">✓ ${t}</span>`).join('')}</div>`;
          prog.style.width = '100%'; prog.style.animation = 'none';
          btn.innerHTML = '<span>🚀</span><span>Train All Layers</span>'; btn.disabled = false;
          if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
          showToast('Training completed successfully', 'success');
          loadModels(); loadLogs();
        } else if (s.status === 'failed') {
          el.className = 'train-status failed';
          el.innerHTML = `<div class="msg">❌ Training failed: ${s.message || 'Unknown error'}</div>`;
          prog.style.width = '0%';
          btn.innerHTML = '<span>🚀</span><span>Train All Layers</span>'; btn.disabled = false;
          if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
          showToast('Training failed', 'error');
          loadModels();
        }
      } catch(e) { console.error('Poll error:', e); }
    }

    // ── Azure ─────────────────────────────────────────────────
    async function azureDownload() {
      const btn = document.getElementById('azure-dl-btn');
      btn.disabled = true; btn.innerHTML = '⏳ Downloading…';
      try {
        const res = await fetch('/api/azure/download', { method: 'POST' });
        const d = await res.json();
        if (d.success) { showToast(d.message, 'success'); loadModels(); }
        else showToast(d.detail || 'Download failed', 'error');
      } catch(e) { showToast('Download failed: ' + e.message, 'error'); }
      btn.disabled = false; btn.innerHTML = '<span>⬇️</span> Download from Azure';
    }

    async function azureUpload() {
      const btn = document.getElementById('azure-ul-btn');
      btn.disabled = true; btn.innerHTML = '⏳ Uploading…';
      try {
        const res = await fetch('/api/azure/upload', { method: 'POST' });
        const d = await res.json();
        if (d.success) { showToast(d.message, 'success'); }
        else showToast(d.detail || 'Upload failed', 'error');
      } catch(e) { showToast('Upload failed: ' + e.message, 'error'); }
      btn.disabled = false; btn.innerHTML = '<span>⬆️</span> Upload to Azure';
    }

    // ── Logs with Pagination & Sorting ──────────────────────────────────
    let currentLogPage = 1;
    let currentLogPerPage = 25;
    let currentLogSort = 'desc';

    async function loadLogs(page = 1) {
      currentLogPage = page;
      try {
        const filter = document.getElementById('layer-filter').value;
        const sort = document.getElementById('sort-order').value;
        const perPage = parseInt(document.getElementById('per-page').value);
        currentLogSort = sort;
        currentLogPerPage = perPage;

        const url = `/api/training/logs?layer=${encodeURIComponent(filter)}&page=${page}&per_page=${perPage}&sort=${sort}`;
        const res = await fetch(url);
        const data = await res.json();

        document.getElementById('log-count').textContent = `(${data.count} entries)`;
        const wrap = document.getElementById('log-table-wrap');

        if (!data.count || !data.entries.length) {
          wrap.innerHTML = '<div class="empty-log">No low-confidence predictions logged yet</div>';
          document.getElementById('pagination-controls').innerHTML = '';
          document.getElementById('pagination-info').textContent = '';
          return;
        }

        wrap.innerHTML = `<div class="log-table-wrap"><table class="log-table">
          <thead><tr><th style="width:180px;">Timestamp</th><th>Layer</th><th>Text</th><th style="width:130px;">Predicted</th><th style="width:90px;">Confidence</th></tr></thead>
          <tbody>${data.entries.map(e => {
            const conf = (e.confidence * 100).toFixed(1);
            const cClass = e.confidence < 0.4 ? 'low' : 'mid';
            return `<tr><td>${e.timestamp || '—'}</td><td>${e.layer || '—'}</td><td style="max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${(e.text||'').replace(/"/g,'&quot;')}">${(e.text||'').substring(0,120)}</td><td>${e.predicted_label || '—'}</td><td><span class="conf-badge ${cClass}">${conf}%</span></td></tr>`;
          }).join('')}</tbody></table></div>`;

        // Pagination controls and info
        renderPaginationControls(data.page, data.total_pages);
      } catch(e) { showToast('Failed to load logs', 'error'); }
    }

    function renderPaginationControls(currentPage, totalPages) {
      const container = document.getElementById('pagination-controls');
      const info = document.getElementById('pagination-info');
      info.textContent = `Page ${currentPage} of ${totalPages}`;

      if (totalPages <= 1) {
        container.innerHTML = '';
        return;
      }

      let html = '';
      // Prev button
      html += `<button class="btn btn-secondary" style="padding:4px 10px;font-size:12px;" ${currentPage === 1 ? 'disabled' : ''} onclick="loadLogs(${currentPage - 1})">← Prev</button>`;
      // Page numbers (show around current)
      const start = Math.max(1, currentPage - 2);
      const end = Math.min(totalPages, currentPage + 2);
      for (let p = start; p <= end; p++) {
        if (p === currentPage) {
          html += `<button class="btn btn-primary" style="padding:4px 10px;font-size:12px;" disabled>${p}</button>`;
        } else {
          html += `<button class="btn btn-secondary" style="padding:4px 10px;font-size:12px;" onclick="loadLogs(${p})">${p}</button>`;
        }
      }
      // Next button
      html += `<button class="btn btn-secondary" style="padding:4px 10px;font-size:12px;" ${currentPage === totalPages ? 'disabled' : ''} onclick="loadLogs(${currentPage + 1})">Next →</button>`;
      container.innerHTML = html;
    }

    async function clearLogs() {
      if (!confirm('Clear all low-confidence log entries?')) return;
      try {
        const res = await fetch('/api/training/clear-logs', { method: 'POST' });
        const d = await res.json();
        showToast(d.message, 'success');
        loadLogs(1); // reload from first page
      } catch(e) { showToast('Failed to clear logs', 'error'); }
    }

    document.getElementById('layer-filter').addEventListener('change', loadLogs);

    // ── Event Listeners ─────────────────────────────────────────────
    document.getElementById('layer-filter').addEventListener('change', () => loadLogs(1));
    document.getElementById('sort-order').addEventListener('change', () => loadLogs(1));
    document.getElementById('per-page').addEventListener('change', () => loadLogs(1));

    // ── Init ─────────────────────────────────────────────────
    loadModels();
    loadLogs(1);
    checkTraining();
  </script>
</body>
</html>
